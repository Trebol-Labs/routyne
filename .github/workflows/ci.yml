name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token: read repo content only; no write access needed for CI checks
permissions:
  contents: read

jobs:
  ci:
    name: Lint · Commit Guard · Typecheck · Test · Build · E2E
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check commit messages
        run: pnpm check:commits

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Mirror the production env surface. Empty optional values keep CI deterministic.
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          NEXT_PUBLIC_SITE_URL: https://routyne-nu.vercel.app
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || '' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || '' }}
          NEXT_PUBLIC_COACH_ENABLED: 'false'
          VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN || '' }}
          COACH_DAILY_LIMIT_FREE: ${{ secrets.COACH_DAILY_LIMIT_FREE || '' }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY || '' }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY || '' }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY || '' }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT || '' }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E smoke
        run: pnpm test:e2e
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          NEXT_PUBLIC_SITE_URL: https://routyne-nu.vercel.app
          NEXT_PUBLIC_SUPABASE_URL: ''
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
          NEXT_PUBLIC_COACH_ENABLED: 'false'
